name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:

    - uses: actions/checkout@v4

    - name: Build App
      run: |

        xcodebuild \
        -project MorePlay.xcodeproj \
        -scheme MorePlay \
        -sdk iphoneos \
        -configuration Release \
        build

    - name: Create IPA
      run: |

        mkdir Payload

        cp -r build/Release-iphoneos/MorePlay.app Payload/

        zip -r MorePlay.ipa Payload

    - name: Upload IPA

      uses: actions/upload-artifact@v4

      with:

        name: MorePlayIPA

        path: MorePlay.ipa
